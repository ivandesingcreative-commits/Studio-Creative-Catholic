name: Compilar APK de la Tradición

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Permite compilar manualmente desde la web de GitHub

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Clonar el repositorio
      uses: actions/checkout@v4

    - name: Configurar Java JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Corregir saltos de línea (CRLF) y otorgar permisos de ejecución a Gradle
      run: |
        sed -i 's/\r$//' gradlew || true
        chmod +x gradlew || true

    - name: Crear archivo de variables de entorno ficticio para compilación
      run: |
        echo "GEMINI_API_KEY=dummy_key_for_compilation" > .env

    - name: Reconstruir o Generar debug.keystore
      run: |
        set +e
        if [ -f "debug.keystore.base64" ]; then
          echo "Decodificando debug.keystore desde base64..."
          base64 -d debug.keystore.base64 > debug.keystore || base64 --decode debug.keystore.base64 > debug.keystore
        fi
        if [ ! -f "debug.keystore" ] || [ ! -s "debug.keystore" ]; then
          echo "debug.keystore no encontrado o vacío, generando nuevo de depuración..."
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
        fi
        set -e

    - name: Compilar APK en modo Depuración (Debug)
      run: ./gradlew assembleDebug

    - name: Subir Archivo APK para descargar en el celular
      uses: actions/upload-artifact@v4
      with:
        name: LaVozDeLaTradicion-APK
        path: app/build/outputs/apk/debug/app-debug.apk
